{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Panel | Society Connect{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- SHARED CORE CSS -->
    <link rel="stylesheet" href="{% static 'core/css/navigation.css' %}">
    
    <!-- ADMIN GLOBAL OVERRIDES -->
    <link rel="stylesheet" href="{% static 'admin_panel/css/admin_global.css' %}">

    {% block extra_css %}
    {% endblock %}
</head>
<body>

    {% include 'admin_panel/navigation.html' %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
