{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Society Connect{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'core/css/navigation.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>

    {% include 'core/navigation.html' %}

    <div class="layout-wrapper">
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        const hamBtn = document.getElementById("hamBtn");
        if (hamBtn) {
            hamBtn.addEventListener("click", () => {
                document.getElementById("mobileSidebar").classList.toggle("sidebar-active");
            });
        }
    </script>

</body>
</html>
